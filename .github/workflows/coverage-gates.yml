name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

# Advisory only — CI reports status but does not block merge.
# Local checks (run-lint.sh, run-coverage-gates.sh, run-perf-gates.sh)
# are the authoritative quality gates and run against the correct SDK/toolchain.

jobs:
  lint:
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install lint tools
        run: brew install swiftlint swiftformat xcbeautify
      - name: Install Periphery
        continue-on-error: true
        run: brew install periphery
      - name: SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml
      - name: SwiftFormat (check)
        run: swiftformat Sources/ Tests/ --lint --config .swiftformat
      - name: Build (xcbeautify)
        continue-on-error: true
        run: swift build 2>&1 | xcbeautify; exit ${PIPESTATUS[0]}
      - name: Periphery (dead code)
        continue-on-error: true
        run: periphery scan
  smoke:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Smoke tests
        run: swift test --filter testSmoke 2>&1 | xcbeautify; exit ${PIPESTATUS[0]}
  coverage:
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite with coverage
        run: swift test --enable-code-coverage 2>&1 | xcbeautify; exit ${PIPESTATUS[0]}
      - name: Validate coverage minimums
        continue-on-error: true
        run: ./Scripts/coverage-gates.sh
      - name: Collect coverage artifacts
        if: always()
        run: |
          mkdir -p coverage-artifacts
          find .build -type f -path "*codecov/*.json" -exec cp {} coverage-artifacts/ \;
          ./Scripts/coverage-gates.sh > coverage-artifacts/coverage-gates.txt || true
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: coverage-artifacts
