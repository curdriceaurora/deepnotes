name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install lint tools
        run: brew install swiftlint swiftformat periphery xcbeautify
      - name: SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml
      - name: SwiftFormat (check)
        run: swiftformat Sources/ Tests/ --lint --config .swiftformat
      - name: Periphery (dead code)
        continue-on-error: true
        run: periphery scan
      - name: Build (xcbeautify)
        run: swift build 2>&1 | xcbeautify && exit ${PIPESTATUS[0]}
  coverage:
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite with coverage
        run: swift test --enable-code-coverage 2>&1 | xcbeautify
      - name: Validate coverage minimums
        continue-on-error: true
        run: ./Scripts/coverage-gates.sh
      - name: Collect coverage artifacts
        if: always()
        run: |
          mkdir -p coverage-artifacts
          find .build -type f -path "*codecov/*.json" -exec cp {} coverage-artifacts/ \;
          ./Scripts/coverage-gates.sh > coverage-artifacts/coverage-gates.txt || true
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: coverage-artifacts

  performance:
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run performance gates (release)
        continue-on-error: true
        run: ./Scripts/run-perf-gates.sh
      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-artifacts
          path: perf-artifacts
