name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this pull request and provide feedback as a GitHub PR review.
            Focus on: correctness, potential bugs, Swift/SwiftUI best practices,
            concurrency safety (Swift 6 strict mode), test coverage gaps, and
            any regressions in the architecture (NotesDomain → NotesStorage →
            NotesSync → NotesFeatures → NotesUI → NotesApp dependency direction).
            Post inline comments on specific lines where you find issues.
            If the changes look good, submit an approving review with a brief summary.

