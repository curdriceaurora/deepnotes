# Pre-commit hooks configuration
# Runs linting and style checks before commit

repos:
  # SwiftLint: Swift code style and quality rules
  - repo: local
    hooks:
      - id: swiftlint
        name: SwiftLint
        entry: swiftlint lint --strict
        language: system
        types: [swift]
        stages: [commit]
        require_serial: true
