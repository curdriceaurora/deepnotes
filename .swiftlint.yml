---
# SwiftLint Configuration - Comprehensive disable of problematic rules

disabled_rules:
  # Basic/style rules that are too strict for existing codebase
  - identifier_name
  - todo
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - function_parameter_count
  - large_tuple
  - implicit_optional_initialization
  - statement_position
  - opening_brace
  - trailing_comma
  - unused_closure_parameter
  - force_try
  - multiple_closures_with_trailing_closure

reporter: "xcode"
