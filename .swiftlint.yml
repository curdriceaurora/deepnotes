included:
  - Sources
  - Tests

excluded:
  - .build

opt_in_rules:
  - sorted_imports
  - closure_spacing
  - contains_over_first_not_nil
  - empty_count
  - explicit_init
  - first_where
  - modifier_order
  - override_in_extension
  - prefer_self_type_over_type_of_self

line_length:
  warning: 140
  error: 160
  ignores_comments: true
  ignores_urls: true

cyclomatic_complexity:
  warning: 15
  error: 20

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 250
  error: 350

function_body_length:
  warning: 50
  error: 80

function_parameter_count:
  warning: 6
  error: 8

identifier_name:
  min_length: 2
  excluded: [id, db, vc, vm, on, at, to, i, j, k, x, y]

disabled_rules:
  - todo
  - trailing_comma
  - multiple_closures_with_trailing_closure

reporter: xcode
