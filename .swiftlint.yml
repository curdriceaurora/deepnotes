---
# SwiftLint Configuration - Minimal and practical
# Only enable rules that improve code quality without breaking existing code

disabled_rules:
  - identifier_name
  - todo
  - multiple_closures_with_trailing_closure
  - force_try
  - file_length
  - cyclomatic_complexity
  - function_body_length
  - line_length
  - type_body_length
  - large_tuple
  - implicit_return

opt_in_rules:
  - closing_brace
  - empty_parentheses_with_trailing_closure

reporter: "xcode"
