included:
  - Sources
  - Tests

excluded:
  - .build

opt_in_rules:
  - closure_spacing
  - contains_over_first_not_nil
  - empty_count
  - explicit_init
  - first_where
  - modifier_order
  - override_in_extension
  - prefer_self_type_over_type_of_self

line_length:
  warning: 140
  error: 160
  ignores_comments: true
  ignores_urls: true

# Structural limits — accommodating existing codebase.
# Tighten these as files are refactored / split.
cyclomatic_complexity:
  warning: 15
  error: 25

file_length:
  warning: 1000
  error: 2500

type_body_length:
  warning: 500
  error: 1600

function_body_length:
  warning: 80
  error: 250

function_parameter_count:
  warning: 6
  error: 8

identifier_name:
  min_length: 2
  excluded: [id, db, vc, vm, on, at, to, i, j, k, x, y, c, e, l, p, r, s]

disabled_rules:
  - todo
  - trailing_comma
  - multiple_closures_with_trailing_closure
  - large_tuple
  - force_try
  - blanket_disable_command
  - opening_brace

reporter: xcode
