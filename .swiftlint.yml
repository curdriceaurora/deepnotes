---
# SwiftLint Configuration - Minimal and practical
# Disabled rules that conflict with existing codebase

disabled_rules:
  - identifier_name
  - todo
  - multiple_closures_with_trailing_closure
  - force_try
  - file_length
  - cyclomatic_complexity
  - function_body_length
  - line_length  # Use default 120 to match CI runner behavior

opt_in_rules:
  - closing_brace
  - empty_parentheses_with_trailing_closure
  - explicit_init
  - implicit_return
  - nesting
  - operator_usage_whitespace

reporter: "xcode"
